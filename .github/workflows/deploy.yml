name: Build and Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: passyourinterviewwithai
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/client/dist

          # Server source code + package files (App Service will npm install)
          cp server/server.js deploy/server/
          cp server/package.json deploy/server/
          cp server/package-lock.json deploy/server/
          cp -r server/routes deploy/server/routes
          cp -r server/services deploy/server/services

          # Built client static files
          cp -r client/dist/* deploy/client/dist/

          # Root package.json
          cp package.json deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy/

      - name: Azure logout
        run: az logout
        if: always()
