name: Build and Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: passyourinterviewwithai
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci --production

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/client/dist

          # Server code + production node_modules
          cp server/server.js deploy/server/
          cp server/package.json deploy/server/
          cp server/package-lock.json deploy/server/
          cp -r server/routes deploy/server/routes
          cp -r server/services deploy/server/services
          cp -r server/node_modules deploy/server/node_modules

          # Built client static files
          cp -r client/dist/* deploy/client/dist/

          # Root package.json
          cp package.json deploy/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: deploy/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy/

      - name: Azure logout
        run: az logout
        if: always()
